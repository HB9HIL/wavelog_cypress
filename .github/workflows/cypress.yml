name: Cypress Tests

# Runs on pushes to master and on manual dispatch. Unlike the GitLab pipeline
# (single shared shell runner), every job here runs on its own fresh, isolated
# ubuntu-latest VM with Docker preinstalled. That removes the need for port
# offsets, name suffixes and the separate destroy/cleanup stages GitLab needs.
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  # The web image is identical for every DB combo, so build it once per PHP
  # version and share it with the other jobs as an artifact (no registry login).
  # NOTE: the php list is repeated in every job below and must stay in sync.
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - name: Build Wavelog web image (PHP ${{ matrix.php }})
        run: |
          mkdir -p /tmp/wavelog
          curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz \
            | tar xz --strip-components=1 -C /tmp/wavelog
          # Dockerfile pins a fixed PHP base image; swap it for the matrix version
          sed -i "s|^FROM php:.*|FROM php:${{ matrix.php }}-apache|" /tmp/wavelog/Dockerfile
          # Enable MQTT so the MQTT e2e test has something to assert on. The
          # installer copies install/config/config.php into the docker config
          # dir, so appending here bakes mqtt_server=mqtt-broker into the image.
          cat >> /tmp/wavelog/install/config/config.php <<'EOF'
          $config['mqtt_server'] = 'mqtt-broker';
          $config['mqtt_port'] = 1883;
          $config['mqtt_prefix'] = 'wavelog/';
          EOF
          docker build -t wavelog-web:php${{ matrix.php }} /tmp/wavelog
          docker save wavelog-web:php${{ matrix.php }} | gzip > image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavelog-web-image-php-${{ matrix.php }}
          path: image.tar.gz
          retention-days: 1

  # Syntax check every PHP file with the exact PHP version the image ships.
  php-lint:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: wavelog-web-image-php-${{ matrix.php }}
      - name: Load image
        run: docker load < image.tar.gz
      - name: PHP syntax check
        run: |
          docker run --rm wavelog-web:php${{ matrix.php }} bash -c \
            'find /var/www/html -name "*.php" -print0 | xargs -0 -n1 -P"$(nproc)" php -d display_errors=stderr -l >/dev/null'
          echo "PHP ${{ matrix.php }} syntax OK"

  # Container startup and cypress run live in one job so npm ci overlaps with
  # the database init. Runs the full PHP x DB cross product; each combo runs on
  # its own isolated VM.
  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        db:
          - { slug: mariadb-10-11, image: "mariadb:10.11", vendor: mariadb }
          - { slug: mariadb-11-4,  image: "mariadb:11.4",  vendor: mariadb }
          - { slug: mariadb-11-8,  image: "mariadb:11.8",  vendor: mariadb }
          - { slug: mysql-8-0,     image: "mysql:8.0",     vendor: mysql }
          - { slug: mysql-8-4,     image: "mysql:8.4",     vendor: mysql }
          - { slug: mysql-9-4,     image: "mysql:9.4",     vendor: mysql }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: wavelog-web-image-php-${{ matrix.php }}

      - name: Load image
        run: docker load < image.tar.gz

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Start database
        run: |
          docker network create wavelog_testnet
          # MariaDB and MySQL images use different env var names for the same thing
          if [ "${{ matrix.db.vendor }}" = "mysql" ]; then
            DB_ENV="-e MYSQL_RANDOM_ROOT_PASSWORD=yes -e MYSQL_DATABASE=wavelog -e MYSQL_USER=wavelog -e MYSQL_PASSWORD=wavelog"
          else
            DB_ENV="-e MARIADB_RANDOM_ROOT_PASSWORD=yes -e MARIADB_DATABASE=wavelog -e MARIADB_USER=wavelog -e MARIADB_PASSWORD=wavelog"
          fi
          docker run -d \
            --name wavelog-db \
            --network wavelog_testnet \
            --network-alias wavelog-db \
            $DB_ENV \
            ${{ matrix.db.image }}

      # DB initializes in the background while npm installs
      - name: Install dependencies
        run: npm ci

      - name: Wait for database
        run: |
          # MariaDB 11.x dropped the mysql* compat binaries; use mariadb-admin there
          if [ "${{ matrix.db.vendor }}" = "mariadb" ]; then PING=mariadb-admin; else PING=mysqladmin; fi
          echo "Waiting for ${{ matrix.db.image }} to become ready..."
          for i in $(seq 1 60); do
            if docker exec wavelog-db "$PING" ping -h localhost --silent 2>/dev/null; then
              echo "Database is ready"; exit 0
            fi
            sleep 2
          done
          echo "Database did not become ready in time"; exit 1

      - name: Start web container
        run: |
          docker run -d \
            --name wavelog-web \
            --network wavelog_testnet \
            -p 8080:80 \
            wavelog-web:php${{ matrix.php }}

      # Broker for the MQTT e2e test: reachable by the web container via the
      # network alias mqtt-broker and by the Cypress node process via localhost.
      - name: Start MQTT broker
        run: |
          docker run -d \
            --name wavelog-mqtt \
            --network wavelog_testnet \
            --network-alias mqtt-broker \
            -p 1883:1883 \
            -v "${{ github.workspace }}/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

      - name: Run Cypress
        env:
          CYPRESS_baseUrl: "http://localhost:8080/"
          MQTT_BROKER_URL: "mqtt://localhost:1883"
        run: npx cypress run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-artifacts-php${{ matrix.php }}-${{ matrix.db.slug }}
          path: |
            cypress/screenshots/**/*.png
            results/junit-*.xml
          retention-days: 7
          if-no-files-found: ignore
