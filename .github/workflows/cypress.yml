name: Cypress Tests

# Manual trigger only. Unlike the GitLab pipeline (single shared shell runner),
# every job here runs on its own fresh, isolated ubuntu-latest VM with Docker
# preinstalled. That removes the need for port offsets, name suffixes and the
# separate destroy/cleanup stages the GitLab pipeline requires.
on:
  workflow_dispatch:

jobs:
  # The web image is identical for every DB combo, so build it once and share it
  # with the other jobs as an artifact (no registry login needed).
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Wavelog web image
        run: |
          mkdir -p /tmp/wavelog
          curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz \
            | tar xz --strip-components=1 -C /tmp/wavelog
          docker build -t wavelog-web:ci /tmp/wavelog
          docker save wavelog-web:ci | gzip > image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wavelog-web-image
          path: image.tar.gz
          retention-days: 1

  # Syntax check every PHP file with the exact PHP version the image ships.
  php-lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: wavelog-web-image
      - name: Load image
        run: docker load < image.tar.gz
      - name: PHP syntax check
        run: |
          docker run --rm wavelog-web:ci bash -c \
            'find /var/www/html -name "*.php" -print0 | xargs -0 -n1 -P"$(nproc)" php -d display_errors=stderr -l >/dev/null'
          echo "PHP syntax OK"

  # Container startup and cypress run live in one job so npm ci overlaps with
  # the database init. Each combo runs on its own isolated VM.
  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { db_slug: mariadb-10-11, db_image: "mariadb:10.11", db_vendor: mariadb }
          - { db_slug: mariadb-11-4,  db_image: "mariadb:11.4",  db_vendor: mariadb }
          - { db_slug: mariadb-11-8,  db_image: "mariadb:11.8",  db_vendor: mariadb }
          - { db_slug: mysql-8-0,     db_image: "mysql:8.0",     db_vendor: mysql }
          - { db_slug: mysql-8-4,     db_image: "mysql:8.4",     db_vendor: mysql }
          - { db_slug: mysql-9-4,     db_image: "mysql:9.4",     db_vendor: mysql }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: wavelog-web-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Start database
        run: |
          docker network create wavelog_testnet
          # MariaDB and MySQL images use different env var names for the same thing
          if [ "${{ matrix.db_vendor }}" = "mysql" ]; then
            DB_ENV="-e MYSQL_RANDOM_ROOT_PASSWORD=yes -e MYSQL_DATABASE=wavelog -e MYSQL_USER=wavelog -e MYSQL_PASSWORD=wavelog"
          else
            DB_ENV="-e MARIADB_RANDOM_ROOT_PASSWORD=yes -e MARIADB_DATABASE=wavelog -e MARIADB_USER=wavelog -e MARIADB_PASSWORD=wavelog"
          fi
          docker run -d \
            --name wavelog-db \
            --network wavelog_testnet \
            --network-alias wavelog-db \
            $DB_ENV \
            ${{ matrix.db_image }}

      # DB initializes in the background while npm installs
      - name: Install dependencies
        run: npm ci

      - name: Wait for database
        run: |
          echo "Waiting for ${{ matrix.db_image }} to become ready..."
          for i in $(seq 1 60); do
            if docker exec wavelog-db mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo "Database is ready"; exit 0
            fi
            sleep 2
          done
          echo "Database did not become ready in time"; exit 1

      - name: Start web container
        run: |
          docker run -d \
            --name wavelog-web \
            --network wavelog_testnet \
            -p 8080:80 \
            wavelog-web:ci

      - name: Run Cypress
        env:
          CYPRESS_baseUrl: "http://localhost:8080/"
        run: npx cypress run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ matrix.db_slug }}
          path: |
            cypress/screenshots/**/*.png
            cypress/videos/**/*.mp4
            results/junit-*.xml
          retention-days: 7
          if-no-files-found: ignore
