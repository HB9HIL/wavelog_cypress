name: Cypress Tests

# Show the tested repo/branch as the run title in the Actions list. On push
# there are no inputs, so fall back to the same defaults as the env block below.
run-name: Test ${{ github.event.inputs.REPO || 'wavelog/wavelog' }}@${{ github.event.inputs.BRANCH || 'dev' }}${{ github.event.inputs.SHA && format(' @ {0}', github.event.inputs.SHA) || '' }}

# Runs on pushes to master and on manual dispatch. Unlike the GitLab pipeline
# (single shared shell runner), every job here runs on its own fresh, isolated
# ubuntu-latest VM with Docker preinstalled. That removes the need for port
# offsets, name suffixes and the separate destroy/cleanup stages GitLab needs.
on:
  workflow_dispatch:
    # Same knobs as run_once.sh: which Wavelog repo/branch to pull and test.
    inputs:
      REPO:
        description: 'Wavelog repo to pull'
        default: 'wavelog/wavelog'
      BRANCH:
        description: 'Wavelog branch to pull'
        default: 'dev'
      SHA:
        description: 'Wavelog commit SHA under test (pins the checkout; blank = branch tip)'
        default: ''
  push:
    branches:
      - master

# Expose REPO/BRANCH to every job's run: steps as $REPO/$BRANCH. On push (no
# inputs) they fall back to the run_once.sh defaults.
env:
  REPO: ${{ github.event.inputs.REPO || 'wavelog/wavelog' }}
  BRANCH: ${{ github.event.inputs.BRANCH || 'dev' }}
  # The relay passes the PR head SHA so the checkout can pin the exact commit.
  # Empty on push (no inputs); the checkout then falls back to the branch tip.
  SHA: ${{ github.event.inputs.SHA || '' }}

jobs:
  # The web image is identical for every DB combo, so build it once per PHP
  # version and share it with the other jobs as an artifact (no registry login).
  # NOTE: the php list is repeated in every job below and must stay in sync.
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - name: Checkout Wavelog (${{ env.REPO }}@${{ env.SHA || env.BRANCH }})
        uses: actions/checkout@v5
        with:
          repository: ${{ env.REPO }}
          # Pin the exact commit the relay reported; fall back to the branch tip
          # for the push-triggered run, which carries no SHA input.
          ref: ${{ env.SHA || env.BRANCH }}
          path: wavelog
      - name: Build Wavelog web image (PHP ${{ matrix.php }} @ ${{ env.SHA || env.BRANCH }})
        run: |
          # Dockerfile pins a fixed PHP base image; swap it for the matrix version
          sed -i "s|^FROM php:.*|FROM php:${{ matrix.php }}-apache|" wavelog/Dockerfile
          # Enable MQTT so the MQTT e2e test has something to assert on. The
          # installer copies install/config/config.php into the docker config
          # dir, so appending here bakes mqtt_server=mqtt-broker into the image.
          # special_callsign enables the Clubstation/Impersonate feature for the
          # clubstation e2e test (the installer generates a random encryption_key,
          # so impersonate is not blocked by the default flossie key).
          cat >> wavelog/install/config/config.php <<'EOF'
          $config['mqtt_server'] = 'mqtt-broker';
          $config['mqtt_port'] = 1883;
          $config['mqtt_prefix'] = 'wavelog/';
          $config['special_callsign'] = true;
          EOF
          docker build -t wavelog-web:php${{ matrix.php }} wavelog
          docker save wavelog-web:php${{ matrix.php }} | gzip > image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavelog-web-image-php-${{ matrix.php }}
          path: image.tar.gz
          retention-days: 1

  # Install the node deps and the Cypress binary once, then publish them to the
  # cache (keyed on package-lock.json) so the various test matrix combos restore them
  # instead of each running npm ci and downloading Cypress. Runs in parallel with
  # build; the test job waits on both. setup-node's cache: npm only caches the
  # ~/.npm download dir (a cold npm ci); node_modules and ~/.cache/Cypress are
  # what actually let the test job skip the install entirely.
  deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Cache node_modules and Cypress binary
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: deps-${{ hashFiles('package-lock.json') }}
      # npm ci's postinstall pulls the Cypress binary into ~/.cache/Cypress, so a
      # single install warms both cached paths. Skipped when the cache already hit.
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  # Syntax check every PHP file with the exact PHP version the image ships.
  php-lint:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: wavelog-web-image-php-${{ matrix.php }}
      - name: Load image
        run: docker load < image.tar.gz
      - name: PHP syntax check
        run: |
          docker run --rm wavelog-web:php${{ matrix.php }} bash -c \
            'find /var/www/html -name "*.php" -print0 | xargs -0 -n1 -P"$(nproc)" php -d display_errors=stderr -l >/dev/null'
          echo "PHP ${{ matrix.php }} syntax OK"

  # Static analysis on the Wavelog source. No PHP/DB matrix needed and no
  # dependency on the built image, so these fetch the source directly and run
  # in parallel. continue-on-error keeps them informational for now (CI3 magic
  # produces noise at any phpstan level); drop it to turn them into a gate.
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for phpstan.neon)
        uses: actions/checkout@v5
      - name: Fetch Wavelog source
        run: |
          echo "Fetching Wavelog source from ${REPO} branch ${BRANCH}"
          mkdir -p src
          curl -L "https://github.com/${REPO}/archive/refs/heads/${BRANCH}.tar.gz" \
            | tar xz --strip-components=1 -C src
      - name: PHPStan (level 0)
        # Pin a current PHPStan; phpstan/phpstan:latest on Docker Hub is stuck on
        # 0.12 and cannot parse PHP 8 syntax. Config is checked in as phpstan.neon.
        run: |
          docker run --rm \
            -v "$PWD/src:/app" \
            -v "$PWD/phpstan.neon:/phpstan.neon:ro" \
            ghcr.io/phpstan/phpstan:2 \
            analyse -c /phpstan.neon --no-progress --memory-limit=1G

  # SQL injection / PHP security scan.
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Wavelog source
        run: |
          mkdir -p src
          curl -L "https://github.com/${REPO}/archive/refs/heads/${BRANCH}.tar.gz" \
            | tar xz --strip-components=1 -C src
      - name: Semgrep (PHP ruleset)
        # Exclusions mirror run_once.sh:
        #   system/   CI3 framework core (third-party); also a flat false positive
        #             where log_message() is flagged as tainted SQL.
        #   install/  one-time, pre-auth installer bootstrap; not part of the
        #             running application's attack surface.
        run: |
          docker run --rm -v "$PWD/src:/src" semgrep/semgrep \
            semgrep scan --config p/php --error --quiet \
              --exclude=system --exclude=install

  # Container startup and cypress run live in one job so npm ci overlaps with
  # the database init. Runs the full PHP x DB cross product; each combo runs on
  # its own isolated VM.
  test:
    runs-on: ubuntu-latest
    needs: [build, deps]
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        db:
          - { slug: mariadb-10-11, image: "mariadb:10.11", vendor: mariadb }
          - { slug: mariadb-11-4,  image: "mariadb:11.4",  vendor: mariadb }
          - { slug: mariadb-11-8,  image: "mariadb:11.8",  vendor: mariadb }
          - { slug: mariadb-12-3,  image: "mariadb:12.3",  vendor: mariadb }
          - { slug: mysql-8-0,     image: "mysql:8.0",     vendor: mysql }
          - { slug: mysql-8-4,     image: "mysql:8.4",     vendor: mysql }
          - { slug: mysql-9-7,     image: "mysql:9.7",     vendor: mysql }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: wavelog-web-image-php-${{ matrix.php }}

      - name: Load image
        run: docker load < image.tar.gz

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Populated by the deps job; a hit lets us skip npm ci below entirely.
      - name: Restore node_modules and Cypress binary
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: deps-${{ hashFiles('package-lock.json') }}

      - name: Start database
        run: |
          docker network create wavelog_testnet
          # MariaDB and MySQL images use different env var names for the same thing
          if [ "${{ matrix.db.vendor }}" = "mysql" ]; then
            DB_ENV="-e MYSQL_RANDOM_ROOT_PASSWORD=yes -e MYSQL_DATABASE=wavelog -e MYSQL_USER=wavelog -e MYSQL_PASSWORD=wavelog"
          else
            DB_ENV="-e MARIADB_RANDOM_ROOT_PASSWORD=yes -e MARIADB_DATABASE=wavelog -e MARIADB_USER=wavelog -e MARIADB_PASSWORD=wavelog"
          fi
          docker run -d \
            --name wavelog-db \
            --network wavelog_testnet \
            --network-alias wavelog-db \
            $DB_ENV \
            ${{ matrix.db.image }}

      # Normally a no-op: the deps job primed the cache and the restore above hit.
      # On a cache miss this falls back to npm ci, overlapping with the background
      # DB init.
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Wait for database
        run: |
          # MariaDB 11.x dropped the mysql* compat binaries; use mariadb-admin there
          if [ "${{ matrix.db.vendor }}" = "mariadb" ]; then PING=mariadb-admin; else PING=mysqladmin; fi
          echo "Waiting for ${{ matrix.db.image }} to become ready..."
          for i in $(seq 1 60); do
            if docker exec wavelog-db "$PING" ping -h localhost --silent 2>/dev/null; then
              echo "Database is ready"; exit 0
            fi
            sleep 2
          done
          echo "Database did not become ready in time"; exit 1

      - name: Start web container
        run: |
          docker run -d \
            --name wavelog-web \
            --network wavelog_testnet \
            -p 8080:80 \
            wavelog-web:php${{ matrix.php }}

      # Broker for the MQTT e2e test: reachable by the web container via the
      # network alias mqtt-broker and by the Cypress node process via localhost.
      - name: Start MQTT broker
        run: |
          docker run -d \
            --name wavelog-mqtt \
            --network wavelog_testnet \
            --network-alias mqtt-broker \
            -p 1883:1883 \
            -v "${{ github.workspace }}/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

      - name: Run Cypress
        env:
          CYPRESS_baseUrl: "http://localhost:8080/"
          MQTT_BROKER_URL: "mqtt://localhost:1883"
        run: npx cypress run

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-artifacts-php${{ matrix.php }}-${{ matrix.db.slug }}
          path: |
            cypress/screenshots/**/*.png
            results/junit-*.xml
          retention-days: 7
          if-no-files-found: ignore
