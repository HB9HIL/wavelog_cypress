stages:
  - build
  - test
  - destroy
  - cleanup

default:
  tags:
    - cypress

# Database matrix, shared by test/destroy via YAML anchor.
# PORT_OFFSET keeps host ports unique so all combos can run in parallel.
.db_matrix: &db_matrix
  - { DB_SLUG: "mariadb-10-11", DB_IMAGE: "mariadb:10.11", DB_VENDOR: "mariadb", PORT_OFFSET: "10" }
  - { DB_SLUG: "mariadb-11-4",  DB_IMAGE: "mariadb:11.4",  DB_VENDOR: "mariadb", PORT_OFFSET: "20" }
  - { DB_SLUG: "mariadb-11-8",  DB_IMAGE: "mariadb:11.8",  DB_VENDOR: "mariadb", PORT_OFFSET: "30" }
  - { DB_SLUG: "mysql-8-0",     DB_IMAGE: "mysql:8.0",     DB_VENDOR: "mysql",   PORT_OFFSET: "40" }
  - { DB_SLUG: "mysql-8-4",     DB_IMAGE: "mysql:8.4",     DB_VENDOR: "mysql",   PORT_OFFSET: "50" }
  - { DB_SLUG: "mysql-9-4",     DB_IMAGE: "mysql:9.4",     DB_VENDOR: "mysql",   PORT_OFFSET: "60" }

# The web image is identical for every DB combo, so build it once per pipeline.
# All jobs run on the same shell runner, so the image stays available locally.
build:
  stage: build
  tags:
    - shell
  variables:
    GIT_STRATEGY: none  # only needs the wavelog tarball, not this repo
  script:
    - SRC_DIR=/tmp/wavelog-${CI_PIPELINE_ID}
    - mkdir -p ${SRC_DIR}
    - curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz | tar xz --strip-components=1 -C ${SRC_DIR}
    - docker build -t wavelog-web:${CI_PIPELINE_ID} ${SRC_DIR}
    - rm -rf ${SRC_DIR}

# Syntax check every PHP file with the exact PHP version the image ships.
# Runs inside the shared image, so no PHP install is needed on the runner.
php-lint:
  stage: test
  tags:
    - shell
  variables:
    GIT_STRATEGY: none
  script:
    - |
      docker run --rm wavelog-web:${CI_PIPELINE_ID} bash -c \
        'find /var/www/html -name "*.php" -print0 | xargs -0 -n1 -P"$(nproc)" php -d display_errors=stderr -l >/dev/null'
    - echo "PHP syntax OK"

# Container startup and cypress run live in one job so npm ci overlaps with
# the database init and no combo has to wait for the slowest DB image.
test:
  stage: test
  tags:
    - shell
  parallel:
    matrix: *db_matrix
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    # Per-combo identifiers so parallel jobs don't collide on names/ports
    - SUFFIX="${CI_PIPELINE_ID}-${DB_SLUG}"
    - PORT=$((8000 + (${CI_PIPELINE_ID} % 1000) + ${PORT_OFFSET}))
    - docker network create wavelog_testnet_${SUFFIX}
    # MariaDB and MySQL images use different env var names for the same thing
    - |
      if [ "$DB_VENDOR" = "mysql" ]; then
        DB_ENV="-e MYSQL_RANDOM_ROOT_PASSWORD=yes -e MYSQL_DATABASE=wavelog -e MYSQL_USER=wavelog -e MYSQL_PASSWORD=wavelog"
      else
        DB_ENV="-e MARIADB_RANDOM_ROOT_PASSWORD=yes -e MARIADB_DATABASE=wavelog -e MARIADB_USER=wavelog -e MARIADB_PASSWORD=wavelog"
      fi
    - |
      docker run -d \
        --name wavelog-db-${SUFFIX} \
        --network wavelog_testnet_${SUFFIX} \
        --network-alias wavelog-db \
        $DB_ENV \
        ${DB_IMAGE}
    # DB initializes in the background while npm installs
    - npm ci --cache .npm --prefer-offline
    # Wait for the database to accept connections (MySQL 8/9 init is slow)
    - |
      # MariaDB 11.x dropped the mysql* compat binaries; use mariadb-admin there
      if [ "$DB_VENDOR" = "mariadb" ]; then PING=mariadb-admin; else PING=mysqladmin; fi
      echo "Waiting for ${DB_IMAGE} to become ready..."
      for i in $(seq 1 60); do
        if docker exec wavelog-db-${SUFFIX} "$PING" ping -h localhost --silent 2>/dev/null; then
          echo "Database is ready"; break
        fi
        sleep 2
      done
    - |
      docker run -d \
        --name wavelog-web-${SUFFIX} \
        --network wavelog_testnet_${SUFFIX} \
        -p ${PORT}:80 \
        wavelog-web:${CI_PIPELINE_ID}
    - export CYPRESS_baseUrl="http://localhost:${PORT}/"
    - npx cypress run
  artifacts:
    when: on_failure
    reports:
      junit: results/junit-*.xml
    paths:
      - cypress/screenshots/**/*.png
      - cypress/videos/**/*.mp4
    expire_in: 1 week

destroy:
  stage: destroy
  tags:
    - shell
  variables:
    GIT_STRATEGY: none
  parallel:
    matrix: *db_matrix
  script:
    - SUFFIX="${CI_PIPELINE_ID}-${DB_SLUG}"
    - docker stop wavelog-web-${SUFFIX} wavelog-db-${SUFFIX} || true
    - docker rm wavelog-web-${SUFFIX} wavelog-db-${SUFFIX} || true
    - docker network rm wavelog_testnet_${SUFFIX} || true
  when: always

# Remove the shared image only after all containers using it are gone
cleanup:
  stage: cleanup
  tags:
    - shell
  variables:
    GIT_STRATEGY: none
  script:
    - docker rmi wavelog-web:${CI_PIPELINE_ID} || true
    - rm -rf /tmp/wavelog-${CI_PIPELINE_ID}
  when: always
