stages:
  - concurrency_check
  - build
  - test
  - destroy

default:
  tags:
    - cypress

concurrency_check:
  stage: concurrency_check
  image: reg.git.hb9hil.org/hb9hil/runner_image:latest
  tags: 
    - docker
  script:
    - |
      echo "Überprüfe, ob bereits eine Pipeline auf Branch '${CI_COMMIT_REF_NAME}' läuft..."
      RUNNING=$(curl --silent --header "PRIVATE-TOKEN: $API_TOKEN" \
        "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/pipelines?ref=${CI_COMMIT_REF_NAME}&status=running" \
        | jq '. | length')
      echo "Laufende Pipelines auf diesem Branch: ${RUNNING}"

      if [ "${RUNNING}" -gt 1 ]; then
        echo "Es existiert bereits eine Pipeline auf diesem Branch. Breche diese hier ab..."
        curl --silent --request POST --header "PRIVATE-TOKEN: $API_TOKEN" \
          "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/cancel"
      else
        echo "Keine andere Pipeline läuft. Mache normal weiter..."
      fi

build:
  stage: build
  dependencies:
    - concurrency_check
  script:
    - if [ "$CI_PIPELINE_SOURCE" = "trigger" ]; then echo "Triggered via trigger token API, waiting 2 minutes..."; sleep 120; fi
    - curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz | tar xz --strip-components=1
    - npm install
    - docker compose -f cypress_testserver.yml up -d 
  artifacts:
    paths:
      - node_modules/
    expire_in: 7 day

test:
  stage: test
  dependencies:
    - build
  script:
    - npx cypress run
  artifacts:
    reports:
      junit: results/junit-*.xml
    paths:
      - results/
    expire_in: 4 week

destroy:
  stage: destroy
  script:
    - docker compose -f cypress_testserver.yml down
  when: always