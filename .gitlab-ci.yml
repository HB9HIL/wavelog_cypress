stages:
  - build
  - test
  - destroy

default:
  tags:
    - cypress

build:
  stage: build
  script:
    - curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz | tar xz --strip-components=1
    - npm install
    - docker compose -f cypress_testserver.yml up -d 
  artifacts:
    paths:
      - node_modules/
    expire_in: 7 day

test:
  stage: test
  dependencies:
    - build
  script:
    - npx cypress run
  artifacts:
    reports:
      junit: results/junit-*.xml
    paths:
      - results/
    expire_in: 4 week

destroy:
  stage: destroy
  script:
    - docker compose -f cypress_testserver.yml down
  when: always