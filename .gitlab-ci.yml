stages:
  - concurrency_check
  - build
  - test
  - destroy

default:
  tags:
    - cypress

concurrency_check:
  stage: concurrency_check
  script:
    - |
      echo "Check for other pipelines"
      RUNNING=$(curl --silent --header "PRIVATE-TOKEN: $API_TOKEN" \
        "https://git.berg-systems.ch/api/v4/projects/${CI_PROJECT_ID}/pipelines?ref=${CI_COMMIT_REF_NAME}&status=running" \
        | jq '. | length')

      if [ "${RUNNING}" -gt 1 ]; then
        echo "There is another pipeline. Cancelling this one"
        curl --silent --request POST --header "PRIVATE-TOKEN: $API_TOKEN" \
          "https://git.berg-systems.ch/api/v4/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/cancel"
      else
        echo "No other pipelines. Continue.."
      fi

build:
  stage: build
  dependencies:
    - concurrency_check
  script:
    - if [ "$CI_PIPELINE_SOURCE" = "trigger" ]; then echo "Triggered via trigger token API, waiting 2 minutes..."; sleep 120; fi
    - curl -L https://github.com/wavelog/wavelog/archive/refs/heads/dev.tar.gz | tar xz --strip-components=1
    - npm install
    - docker compose -f cypress_testserver.yml up -d 
  artifacts:
    paths:
      - node_modules/
    expire_in: 7 day

test:
  stage: test
  dependencies:
    - build
  script:
    - npx cypress run
  artifacts:
    reports:
      junit: results/junit-*.xml
    paths:
      - cypress/screenshots/**/*.png
      - cypress/videos/**/*.mp4
    expire_in: 4 week

destroy:
  stage: destroy
  script:
    - docker compose -f cypress_testserver.yml down
  when: always
